spring.application.name=digital-bank-api

# Ensures data.sql runs AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true

# H2 in-memory database (runtime)
spring.datasource.url=jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Allow data.sql to run after Hibernate schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console (optional — useful for manual inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator — expose health and info endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
